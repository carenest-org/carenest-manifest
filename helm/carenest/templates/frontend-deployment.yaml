apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: frontend
  namespace: {{ .Values.namespace }}
  labels:
    app: frontend
    app.kubernetes.io/name: carenest
spec:
  replicas: {{ .Values.replicas.frontend }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: frontend
  strategy:
    blueGreen:
      activeService: frontend-service
      previewService: frontend-preview-service
      autoPromotionEnabled: false
      scaleDownDelaySeconds: 30
      previewReplicaCount: 1
  template:
    metadata:
      labels:
        app: frontend
    spec:
      serviceAccountName: carenest-sa
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.ports.frontend }}
          resources:
            requests:
              cpu: {{ .Values.resources.frontend.requests.cpu }}
              memory: {{ .Values.resources.frontend.requests.memory }}
            limits:
              cpu: {{ .Values.resources.frontend.limits.cpu }}
              memory: {{ .Values.resources.frontend.limits.memory }}
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.ports.frontend }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.ports.frontend }}
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
