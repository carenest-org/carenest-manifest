apiVersion: v1
kind: Service
metadata:
  name: appointment-preview-service
  namespace: {{ .Values.namespace }}
  labels:
    app: appointment
    app.kubernetes.io/name: carenest
    role: preview
spec:
  type: ClusterIP
  selector:
    app: appointment
  ports:
    - port: {{ .Values.ports.appointment }}
      targetPort: {{ .Values.ports.appointment }}
      name: http
